[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --ignore=tests/test_draw_debug.py --ignore=tests/test_freehand.py --ignore=tests/test_selection.py
markers =
    integration: requires live Supabase connection
    playwright: requires playwright browser (excluded from default run)
