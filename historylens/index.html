<script type="importmap">

<script type="module">
import * as THREE from 'three';

// ─────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────
// Real pipeline data lives in historylens_final.json — fetched at startup
// from the discovery-pipeline GitHub master branch. The `nations` array
// is populated from that fetch (see initFromPipeline) before the first
// render. Until then it is empty and the loading overlay is visible.
const DATA_URL = 'https://raw.githubusercontent.com/gregjlake/discovery-pipeline/master/historylens/data/processed/historylens_final.json';

const nations = [];
const nationsByName = {};

// Region → hex color (per Part 2 spec).
const REGION_COLORS = {
  'Western Europe': '#6450DC',
  'Anglo-Pacific':  '#0F3460',
  'North America':  '#3C8214',
  'Latin America':  '#D7507D',
  'East Asia':      '#DC5028',
  'South Asia':     '#0F7360',
  'Eastern Europe': '#8C8A82',
  'Africa':         '#BE7814',
};
const DEFAULT_COLOR = '#7080A0';

// Country centroid coordinates (degrees). All 40 in the pipeline panel.
// Where the original prototype had a coord, that exact value is preserved.
const COUNTRY_COORDS = {
  'Netherlands':     { lon:   5, lat:  52 },
  'United Kingdom':  { lon:  -2, lat:  52 },
  'France':          { lon:   2, lat:  47 },
  'Sweden':          { lon:  16, lat:  62 },
  'Norway':          { lon:  10, lat:  61 },
  'Denmark':         { lon:  10, lat:  56 },
  'Belgium':         { lon:   4, lat:  50 },
  'Italy':           { lon:  12, lat:  43 },
  'United States':   { lon: -98, lat:  38 },
  'Chile':           { lon: -71, lat: -35 },
  'Argentina':       { lon: -64, lat: -34 },
  'Spain':           { lon:  -4, lat:  40 },
  'Switzerland':     { lon:   8, lat:  47 },
  'Japan':           { lon: 138, lat:  37 },
  'Mexico':          { lon:-102, lat:  23 },
  'Brazil':          { lon: -52, lat: -10 },
  'Germany':         { lon:  10, lat:  51 },
  'Russia':          { lon:  55, lat:  58 },
  'Australia':       { lon: 134, lat: -25 },
  'Canada':          { lon: -96, lat:  56 },
  'Finland':         { lon:  26, lat:  64 },
  'Colombia':        { lon: -74, lat:   4 },
  'Peru':            { lon: -76, lat: -10 },
  'Portugal':        { lon:  -8, lat:  40 },
  'Venezuela':       { lon: -66, lat:   8 },
  'China':           { lon: 105, lat:  35 },
  'India':           { lon:  78, lat:  20 },
  'Jamaica':         { lon: -77, lat:  18 },
  'Uruguay':         { lon: -55, lat: -33 },
  'Hungary':         { lon:  19, lat:  47 },
  'Ireland':         { lon:  -8, lat:  53 },
  'Philippines':     { lon: 122, lat:  13 },
  'Bolivia':         { lon: -65, lat: -17 },
  'Cuba':            { lon: -78, lat:  22 },
  'Indonesia':       { lon: 118, lat:  -2 },
  'South Korea':     { lon: 128, lat:  36 },
  'South Africa':    { lon:  25, lat: -29 },
  'Egypt':           { lon:  30, lat:  27 },
  'Poland':          { lon:  19, lat:  52 },
  'Greece':          { lon:  22, lat:  39 },
};

const years = [];
for (let y = 1820; y <= 2000; y += 10) years.push(y);

function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [
    parseInt(h.slice(0, 2), 16),
    parseInt(h.slice(2, 4), 16),
    parseInt(h.slice(4, 6), 16),
  ];
}

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let currentIdx = 0;
let tiltDeg = 40;
let rotateDeg = 20;
let distance = 15;
let isDragging = false;
let dragStartX = 0;
let dragStartRotate = 0;
let dragStartY = 0;
let dragStartTilt = 0;
let playInterval = null;

const disposables = [];
const hitSpheres = [];
// Per-frame screen-space label visibility filter: a list of {sprite, nation}
// repopulated by rebuild(); consulted by updateLabelVisibility() in animate().
const labelEntries = [];

// gaussian terrain parameters
// SIGMA tightened from 0.6 to 0.25 (per brief: try 0.3 first, drop to 0.25 if
// the European cluster still merges). At 0.3 a headless screenshot at 1820
// still showed UK / Netherlands as a single peak, so we use 0.25 here. The
// screen-space label-collision filter (updateLabelVisibility) keeps labels
// readable even where peaks remain partially merged.
const SIGMA = 0.25;
const HEIGHT_SCALE = 3.5;
const GAUSSIAN_POWER = 1.8;

// ─────────────────────────────────────────────────────────────
// SCENE
// ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060c1a);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Static lighting
const ambient = new THREE.AmbientLight(0x223366, 0.5);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xfff5ee, 1.5);
dirLight.position.set(4, 14, 2);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 40;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// ─────────────────────────────────────────────────────────────
// COORDINATE MAPPING
// ─────────────────────────────────────────────────────────────
function lonLatToXZ(lon, lat) {
  return {
    x: (lon / 180) * 7,
    z: -(lat / 90) * 4.5
  };
}

// ─────────────────────────────────────────────────────────────
// STATIC GRID LINES
// ─────────────────────────────────────────────────────────────
function buildGrid() {
  const mat = new THREE.LineBasicMaterial({
    color: 0x1a2a4a,
    transparent: true,
    opacity: 0.5
  });
  const group = new THREE.Group();
  // longitude lines every 30°
  for (let lon = -180; lon <= 180; lon += 30) {
    const x = (lon / 180) * 7;
    const pts = [
      new THREE.Vector3(x, 0.005, -4.5),
      new THREE.Vector3(x, 0.005, 4.5)
    ];
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
  }
  // latitude lines every 30°
  for (let lat = -90; lat <= 90; lat += 30) {
    const z = -(lat / 90) * 4.5;
    const pts = [
      new THREE.Vector3(-7, 0.005, z),
      new THREE.Vector3(7, 0.005, z)
    ];
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
  }
  scene.add(group);
}
buildGrid();

// ─────────────────────────────────────────────────────────────
// TERRAIN HEIGHT FUNCTION
// ─────────────────────────────────────────────────────────────
function gaussianContribution(score, dx, dz) {
  if (score == null || isNaN(score)) return 0;
  const d2 = dx * dx + dz * dz;
  const g = Math.exp(-d2 / (2 * SIGMA * SIGMA));
  return (score / 100) * HEIGHT_SCALE * Math.pow(g, GAUSSIAN_POWER);
}

function heightAt(x, z, idx) {
  let h = 0;
  for (const n of nations) {
    const p = lonLatToXZ(n.lon, n.lat);
    h += gaussianContribution(n.scores[idx], x - p.x, z - p.z);
  }
  return h;
}

// ─────────────────────────────────────────────────────────────
// REBUILD (called whenever year changes)
// ─────────────────────────────────────────────────────────────
function disposeAll() {
  for (const obj of disposables) {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (obj.material.map) obj.material.map.dispose();
      obj.material.dispose();
    }
    if (obj.parent) obj.parent.remove(obj);
  }
  disposables.length = 0;
  hitSpheres.length = 0;
  labelEntries.length = 0;
}

function buildLabelTexture(name, score, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 96;
  const ctx = canvas.getContext('2d');
  // background rounded rect
  ctx.fillStyle = 'rgba(8, 14, 30, 0.85)';
  const r = 14;
  ctx.beginPath();
  ctx.moveTo(r, 2);
  ctx.lineTo(256 - r, 2);
  ctx.quadraticCurveTo(254, 2, 254, r);
  ctx.lineTo(254, 94 - r);
  ctx.quadraticCurveTo(254, 94, 256 - r, 94);
  ctx.lineTo(r, 94);
  ctx.quadraticCurveTo(2, 94, 2, 94 - r);
  ctx.lineTo(2, r);
  ctx.quadraticCurveTo(2, 2, r, 2);
  ctx.fill();
  // border in country color
  ctx.strokeStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, 0.8)`;
  ctx.lineWidth = 2;
  ctx.stroke();
  // name
  ctx.fillStyle = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
  ctx.font = 'bold 26px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(name, 128, 32);
  // score (or em dash when null)
  ctx.fillStyle = '#ffffff';
  ctx.font = '600 28px -apple-system, sans-serif';
  ctx.fillText(score == null ? '—' : Math.round(score).toString(), 128, 70);
  return new THREE.CanvasTexture(canvas);
}

function rebuild() {
  disposeAll();

  // ── Terrain mesh ──
  const geom = new THREE.PlaneGeometry(14, 9, 100, 100);
  geom.rotateX(-Math.PI / 2);
  const positions = geom.attributes.position;
  const colorArr = new Float32Array(positions.count * 3);

  const baseR = 0x06 / 255, baseG = 0x0c / 255, baseB = 0x1a / 255;

  for (let i = 0; i < positions.count; i++) {
    const x = positions.getX(i);
    const z = positions.getZ(i);
    let h = 0;
    let bestNation = null;
    let bestContrib = 0;

    for (const n of nations) {
      const p = lonLatToXZ(n.lon, n.lat);
      const c = gaussianContribution(n.scores[currentIdx], x - p.x, z - p.z);
      h += c;
      if (c > bestContrib) {
        bestContrib = c;
        bestNation = n;
      }
    }

    positions.setY(i, h);

    if (bestNation && bestContrib > 0.04) {
      const t = Math.min(1, bestContrib / 1.0);
      const nr = bestNation.color[0] / 255;
      const ng = bestNation.color[1] / 255;
      const nb = bestNation.color[2] / 255;
      colorArr[i * 3] = baseR + (nr - baseR) * t;
      colorArr[i * 3 + 1] = baseG + (ng - baseG) * t;
      colorArr[i * 3 + 2] = baseB + (nb - baseB) * t;
    } else {
      colorArr[i * 3] = baseR;
      colorArr[i * 3 + 1] = baseG;
      colorArr[i * 3 + 2] = baseB;
    }
  }

  geom.setAttribute('color', new THREE.BufferAttribute(colorArr, 3));
  geom.computeVertexNormals();

  const terrainMat = new THREE.MeshStandardMaterial({
    vertexColors: true,
    metalness: 0.1,
    roughness: 0.65,
    flatShading: false
  });
  const terrain = new THREE.Mesh(geom, terrainMat);
  terrain.receiveShadow = true;
  scene.add(terrain);
  disposables.push(terrain);

  // ── Per-nation peak elements ──
  // Only the top-N scoring countries get point lights this decade — keeps
  // GPU light count manageable now that we have 40 nations (was 8).
  const POINT_LIGHT_LIMIT = 12;
  const lightCandidates = nations
    .filter(n => n.scores[currentIdx] != null)
    .map(n => ({ n, s: n.scores[currentIdx] }))
    .sort((a, b) => b.s - a.s)
    .slice(0, POINT_LIGHT_LIMIT);
  const lightSet = new Set(lightCandidates.map(x => x.n));

  for (const nation of nations) {
    const score = nation.scores[currentIdx];
    if (score == null) continue; // no peak when data is missing this decade
    const p = lonLatToXZ(nation.lon, nation.lat);
    const peakH = heightAt(p.x, p.z, currentIdx);

    // Hit sphere (invisible)
    const sphereGeom = new THREE.SphereGeometry(0.6, 16, 16);
    const sphereMat = new THREE.MeshBasicMaterial({ visible: false });
    const hitSphere = new THREE.Mesh(sphereGeom, sphereMat);
    hitSphere.position.set(p.x, peakH, p.z);
    hitSphere.userData.nation = nation;
    scene.add(hitSphere);
    disposables.push(hitSphere);
    hitSpheres.push(hitSphere);

    // Label sprite
    const tex = buildLabelTexture(nation.name, score, nation.color);
    const sprMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
    const sprite = new THREE.Sprite(sprMat);
    sprite.position.set(p.x, peakH + 0.55, p.z);
    sprite.scale.set(1.3, 0.5, 1);
    sprite.renderOrder = 10;
    scene.add(sprite);
    disposables.push(sprite);
    labelEntries.push({ sprite, nation });

    // Point light at peak — only for the top-N this decade
    if (lightSet.has(nation)) {
      const pl = new THREE.PointLight(
        new THREE.Color(nation.color[0] / 255, nation.color[1] / 255, nation.color[2] / 255),
        (score / 100) * 2.0,
        4
      );
      pl.position.set(p.x, peakH + 0.25, p.z);
      scene.add(pl);
      disposables.push(pl);
    }
  }
}

// ─────────────────────────────────────────────────────────────
// CAMERA POSITIONING
// ─────────────────────────────────────────────────────────────
function updateCamera() {
  const tilt = (tiltDeg * Math.PI) / 180;
  const rot = (rotateDeg * Math.PI) / 180;
  camera.position.x = distance * Math.cos(tilt) * Math.sin(rot);
  camera.position.y = distance * Math.sin(tilt);
  camera.position.z = distance * Math.cos(tilt) * Math.cos(rot);
  camera.lookAt(0, 1.5, 0);
}

// ─────────────────────────────────────────────────────────────
// HOVER POPUP
// ─────────────────────────────────────────────────────────────
const popup = document.getElementById('popup');
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function ordinal(n) {
  if (n == null) return '—';
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function showPopup(nation, clientX, clientY) {
  // Read currentIdx at hover time, not build time
  const idx = currentIdx;
  const ystr = String(years[idx]);
  const score = nation.scores[idx];

  // Rank — only over nations with a score this decade
  const ranked = nations
    .filter(n => n.scores[idx] != null)
    .map(n => ({ n, s: n.scores[idx] }))
    .sort((a, b) => b.s - a.s);
  const rankIdx = ranked.findIndex(o => o.n === nation);
  const rank = rankIdx >= 0 ? rankIdx + 1 : null;
  const rankedTotal = ranked.length;

  // Change vs last decade
  let changeStr = '';
  if (score == null) {
    changeStr = '<span style="color:#6878a0">no data this decade</span>';
  } else if (idx > 0 && nation.scores[idx - 1] != null) {
    const prev = nation.scores[idx - 1];
    const delta = +(score - prev).toFixed(1);
    if (delta > 0) changeStr = `<span class="up">▲ +${delta}</span> vs last decade`;
    else if (delta < 0) changeStr = `<span class="down">▼ ${delta}</span> vs last decade`;
    else changeStr = `<span style="color:#aab8d4">— no change</span> vs last decade`;
  } else {
    changeStr = '<span style="color:#6878a0">starting decade</span>';
  }

  // Real top-3 peers from pipeline JSON
  const peerEntries = (nation.peersByDecade && nation.peersByDecade[ystr]) || [];
  const peerRowsHtml = peerEntries.length === 0
    ? '<div class="popup-meta" style="color:#6878a0">no peers this decade</div>'
    : peerEntries.map(p => {
        if (!p || !p.name) return '';
        const peerNat = nationsByName[p.name];
        const peerCol = peerNat
          ? `rgb(${peerNat.color[0]}, ${peerNat.color[1]}, ${peerNat.color[2]})`
          : 'rgb(120,140,180)';
        const sim = p.similarity != null ? p.similarity + '%' : '—';
        return `
          <div class="popup-peer-row">
            <span class="pdot" style="background:${peerCol}"></span>
            <span>${p.name}</span>
            <span class="psim">${sim}</span>
          </div>`;
      }).join('');

  // peer_stability (0–100, scheme-agreement metric)
  const stab = nation.peerStabilityByDecade && nation.peerStabilityByDecade[ystr];
  const stabStr = stab == null
    ? '<span style="color:#6878a0">peer stability: n/a</span>'
    : `peer stability: <span style="color:#c8d4f0;font-weight:600">${stab}%</span> agreement across schemes`;

  // Urbanization (raw 0–1 ratio from pipeline). Always render the row so the
  // user can tell "no data" apart from "row missing from this build".
  // Suffix "(interp.)" for cells filled by linear interpolation between the
  // CLIO-INFRA 1850/1900/1950/2000 benchmarks.
  const urb = (nation.urbanizationByDecade && nation.urbanizationByDecade[ystr])
              || { raw: null, isInterpolated: false };
  let urbValueHtml;
  if (urb.raw == null) {
    urbValueHtml = '<span style="color:#6878a0">—</span>';
  } else {
    const pct = Math.round(urb.raw * 100);
    const suffix = urb.isInterpolated
      ? ' <span style="color:#6878a0;font-size:11px">(interp.)</span>'
      : '';
    urbValueHtml = `<span style="color:#c8d4f0;font-weight:600">${pct}%</span>${suffix}`;
  }
  const urbRowHtml = `<div class="popup-meta" style="margin-top:4px">urbanization: ${urbValueHtml}</div>`;

  // data_quality pill
  const quality = (nation.dataQualityByDecade && nation.dataQualityByDecade[ystr]) || 'null';
  const qualityClass = 'quality-' + String(quality).toLowerCase();
  const qualityPill = `<span class="quality-pill ${qualityClass}">${quality}</span>`;

  const colorStr = `rgb(${nation.color[0]}, ${nation.color[1]}, ${nation.color[2]})`;
  const scoreDisplay = score == null ? '—' : Math.round(score * 10) / 10;

  popup.innerHTML = `
    <div class="popup-header">
      <span class="dot" style="background:${colorStr}"></span>
      ${nation.name} · ${years[idx]}
      ${qualityPill}
    </div>
    <div class="popup-score" style="color:${colorStr}">${scoreDisplay}</div>
    <div class="popup-meta">
      ${rank != null ? `${ordinal(rank)} of ${rankedTotal}` : `unranked (no score)`}
      <span style="color:#6878a0"> · ${nation.region}</span>
    </div>
    <div class="popup-meta">${changeStr}</div>
    ${urbRowHtml}
    <div class="popup-meta" style="margin-top:6px;color:#aab8d4;font-size:11px;letter-spacing:0.4px;text-transform:uppercase;">Top peers</div>
    ${peerRowsHtml}
    <div class="popup-meta" style="margin-top:6px">${stabStr}</div>
  `;
  popup.style.display = 'block';

  // Position — keep on screen
  const pad = 16;
  const w = popup.offsetWidth;
  const h = popup.offsetHeight;
  let x = clientX + pad;
  let y = clientY + pad;
  if (x + w > window.innerWidth - 8) x = clientX - w - pad;
  if (y + h > window.innerHeight - 8) y = clientY - h - pad;
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
}

function hidePopup() {
  popup.style.display = 'none';
}

// ─────────────────────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────────────────────
const yearSlider = document.getElementById('year');
const yearDisplay = document.getElementById('year-display');
const tiltSlider = document.getElementById('tilt');
const tiltVal = document.getElementById('tilt-val');
const rotateSlider = document.getElementById('rotate');
const rotateVal = document.getElementById('rotate-val');
const playBtn = document.getElementById('play');

function setYear(idx) {
  currentIdx = Math.max(0, Math.min(years.length - 1, idx));
  yearSlider.value = currentIdx;
  yearDisplay.textContent = years[currentIdx];
  rebuild();
}

yearSlider.addEventListener('input', e => {
  stopPlay();
  setYear(parseInt(e.target.value, 10));
});

tiltSlider.addEventListener('input', e => {
  tiltDeg = parseInt(e.target.value, 10);
  tiltVal.textContent = tiltDeg + '°';
  updateCamera();
});

rotateSlider.addEventListener('input', e => {
  rotateDeg = parseInt(e.target.value, 10);
  rotateVal.textContent = rotateDeg + '°';
  updateCamera();
});

function startPlay() {
  if (playInterval) return;
  playBtn.textContent = 'Stop';
  playBtn.classList.add('playing');
  playInterval = setInterval(() => {
    let nxt = currentIdx + 1;
    if (nxt >= years.length) nxt = 0;
    setYear(nxt);
  }, 800);
}
function stopPlay() {
  if (!playInterval) return;
  clearInterval(playInterval);
  playInterval = null;
  playBtn.textContent = 'Play';
  playBtn.classList.remove('playing');
}
playBtn.addEventListener('click', () => {
  if (playInterval) stopPlay(); else startPlay();
});

// Drag to rotate
const canvas = renderer.domElement;
canvas.addEventListener('mousedown', e => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragStartRotate = rotateDeg;
  dragStartTilt = tiltDeg;
  hidePopup();
});
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (isDragging) {
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    rotateDeg = ((dragStartRotate - dx * 0.4) % 360 + 360) % 360;
    tiltDeg = Math.max(20, Math.min(70, dragStartTilt + dy * 0.2));
    rotateSlider.value = Math.round(rotateDeg);
    rotateVal.textContent = Math.round(rotateDeg) + '°';
    tiltSlider.value = Math.round(tiltDeg);
    tiltVal.textContent = Math.round(tiltDeg) + '°';
    updateCamera();
    return;
  }

  // Hover detection
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(hitSpheres, false);
  if (hits.length > 0) {
    showPopup(hits[0].object.userData.nation, e.clientX, e.clientY);
  } else {
    hidePopup();
  }
});

canvas.addEventListener('mouseleave', hidePopup);

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  distance += e.deltaY * 0.012;
  distance = Math.max(8, Math.min(22, distance));
  updateCamera();
}, { passive: false });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─────────────────────────────────────────────────────────────
// LABEL COLLISION FILTER (screen-space, greedy by score)
// ─────────────────────────────────────────────────────────────
// Each frame: project every label sprite into screen-space, sort by score,
// then greedily place labels and hide any that fall within COLLISION_R pixels
// of an already-placed higher-scoring label. Hit spheres are untouched so
// hovering an unlabeled peak still works exactly as before.
// Collision radius in pixels. Set so adjacent same-latitude European labels
// (UK 52° / Netherlands 52° / France 47°) all fit visible at default zoom.
// Tighter than the sprite width — labels can overlap edges slightly — but
// stops same-pixel stacking like the original 1820 NL/UK/France pile-up.
const COLLISION_R = 40;
const _projV = new THREE.Vector3();
function updateLabelVisibility() {
  if (labelEntries.length === 0) return;
  const w = renderer.domElement.clientWidth;
  const h = renderer.domElement.clientHeight;
  const items = labelEntries.map(({ sprite, nation }) => {
    _projV.copy(sprite.position).project(camera);
    const sc = nation.scores[currentIdx];
    return {
      sprite,
      score: sc == null ? -Infinity : sc,
      x: (_projV.x + 1) * 0.5 * w,
      y: (1 - _projV.y) * 0.5 * h,
      behindCamera: _projV.z > 1 || _projV.z < -1,
    };
  });
  items.sort((a, b) => b.score - a.score);
  const placed = [];
  const r2 = COLLISION_R * COLLISION_R;
  for (const it of items) {
    if (it.behindCamera) {
      it.sprite.visible = false;
      continue;
    }
    let collides = false;
    for (const p of placed) {
      const dx = it.x - p.x, dy = it.y - p.y;
      if (dx * dx + dy * dy < r2) { collides = true; break; }
    }
    it.sprite.visible = !collides;
    if (!collides) placed.push(it);
  }
}

// ─────────────────────────────────────────────────────────────
// INIT + RENDER LOOP
// ─────────────────────────────────────────────────────────────
updateCamera();
function animate() {
  requestAnimationFrame(animate);
  updateLabelVisibility();
  renderer.render(scene, camera);
}
animate();

// ─────────────────────────────────────────────────────────────
// FETCH PIPELINE JSON + BOOTSTRAP NATIONS
// ─────────────────────────────────────────────────────────────
function buildNationFromCountry(country) {
  const coords = COUNTRY_COORDS[country.name];
  if (!coords) {
    console.warn(`[HistoryLens] No coordinates for "${country.name}" — skipping`);
    return null;
  }
  const hex = REGION_COLORS[country.region] || DEFAULT_COLOR;
  const color = hexToRgb(hex);

  // Scores as an ordered array matching `years` (1820, 1830, …, 2000)
  const scores = years.map(y => {
    const v = country.scores ? country.scores[String(y)] : null;
    return (v == null || Number.isNaN(v)) ? null : v;
  });

  // Per-decade urbanization (raw ratio + is_interpolated flag).
  // Pipeline schema: country.variables[decade].urbanization = {raw, normalized,
  // normalized_absolute, is_interpolated?}. Pre-1850 decades have raw=null.
  const urbanizationByDecade = {};
  const vars = country.variables || {};
  for (const y of years) {
    const ystr = String(y);
    const cell = (vars[ystr] && vars[ystr].urbanization) || null;
    urbanizationByDecade[ystr] = cell
      ? { raw: cell.raw, isInterpolated: !!cell.is_interpolated }
      : { raw: null, isInterpolated: false };
  }

  return {
    name: country.name,
    iso3: country.iso3,
    region: country.region,
    lon: coords.lon,
    lat: coords.lat,
    color,
    scores,
    peersByDecade: country.peers || {},
    peerStabilityByDecade: country.peer_stability || {},
    dataQualityByDecade: country.data_quality || {},
    urbanizationByDecade,
  };
}

function showLoadingError(msg) {
  const el = document.getElementById('loading');
  if (!el) return;
  el.classList.add('error');
  el.querySelector('.label').textContent = 'Failed to load data';
  el.querySelector('.sub').textContent = msg;
}

function hideLoading() {
  const el = document.getElementById('loading');
  if (el) el.style.display = 'none';
}

async function initFromPipeline() {
  try {
    const res = await fetch(DATA_URL, { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data || !Array.isArray(data.countries)) {
      throw new Error('Unexpected JSON shape — missing `countries` array');
    }

    nations.length = 0;
    for (const c of data.countries) {
      const n = buildNationFromCountry(c);
      if (n) {
        nations.push(n);
        nationsByName[n.name] = n;
      }
    }

    console.log(`Loaded ${nations.length} countries from pipeline JSON`);

    setYear(0);
    hideLoading();
  } catch (err) {
    console.error('[HistoryLens] Failed to load pipeline data:', err);
    showLoadingError(err.message || String(err));
  }
}

initFromPipeline();
</script>
